name: "CodeQL Advanced"

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "27 3 * * 1"

permissions: {}

jobs:
  analyze:
    name: Analyze (actions)
    if: github.repository_owner == 'toobuntu'
    runs-on: ubuntu-latest
    concurrency:
      group: "codeql-${{ github.ref }}"
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    permissions:
      security-events: write
      packages: read
    # Note: Objective-C is not supported by CodeQL (removed in
    # github/codeql#14923).  Only GitHub Actions workflow scanning
    # remains.  clang-tidy in the CI workflow provides the static
    # analysis coverage for the Objective-C source.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: actions
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:actions"
