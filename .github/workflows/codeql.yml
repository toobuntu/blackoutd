name: "CodeQL Advanced"

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "27 3 * * 1"

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    if: github.repository_owner == 'toobuntu'
    runs-on: ${{ matrix.runs-on }}
    concurrency:
      group: "codeql-${{ github.ref }}-${{ matrix.language }}"
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    permissions:
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            runs-on: ubuntu-latest
          # Objective-C requires macOS SDK headers to compile.  Run on
          # macos-latest with autobuild so CodeQL can trace clang
          # invocations and analyse the source correctly.
          - language: c-cpp
            build-mode: autobuild
            runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:${{ matrix.language }}"
