name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build
        run: make

      - name: Verify binary
        run: |
          file build/blackoutd | grep --quiet Mach-O
          codesign --verify build/blackoutd

  lint-plist:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate and lint plist
        run: |
          make postinstall
          plutil -lint "$HOME/Library/LaunchAgents/$(make -s print-bundle-id).plist"

  lint-format:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check clang-format
        run: |
          find src -name '*.m' -o -name '*.h' | \
            xargs xcrun clang-format --style=file --dry-run --Werror
