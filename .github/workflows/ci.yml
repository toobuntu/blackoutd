name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build
        run: make

      - name: Verify binary
        run: |
          file build/blackoutd | grep --quiet Mach-O
          codesign --verify build/blackoutd

  lint-plist:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate and lint plist
        run: make postinstall

  test:
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Ruby
        # Pin to SHA: gh api repos/ruby/setup-ruby/git/ref/tags/v1 --jq .object.sha
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build
        run: make

      - name: Run tests
        run: bundle exec rspec
