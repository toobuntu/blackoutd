name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build
        run: make

      - name: Verify binary
        run: |
          file build/blackoutd | grep --quiet Mach-O
          codesign --verify build/blackoutd

  lint-plist:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate and lint plist
        run: |
          make postinstall
          plutil -lint "$HOME/Library/LaunchAgents/$(make -s print-bundle-id).plist"

  lint-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check clang-format
        run: |
          find src -name '*.m' -o -name '*.h' | \
            xargs clang-format --style=file --dry-run --Werror

  lint-tidy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Locate clang-tidy
        run: |
          # Xcode ships clang-format but not clang-tidy.  The Homebrew llvm
          # package provides it.  Find the highest-versioned llvm@NN keg
          # rather than relying on `brew --prefix llvm` (which prints a
          # path even when the unversioned formula is not installed).
          LLVM_PREFIX="$(/bin/ls -d "$(brew --prefix)"/opt/llvm@* 2>/dev/null \
            | /usr/bin/sort -V | /usr/bin/tail -1)"
          if [ -n "$LLVM_PREFIX" ] && [ -x "$LLVM_PREFIX/bin/clang-tidy" ]; then
            echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"
          elif command -v clang-tidy >/dev/null 2>&1; then
            : # already on PATH
          else
            echo "::warning::clang-tidy not found; skipping lint-tidy"
            echo "SKIP_TIDY=1" >> "$GITHUB_ENV"
          fi

      - name: Run clang-tidy
        if: env.SKIP_TIDY != '1'
        run: |
          clang-tidy src/*.m -- \
            -fobjc-arc \
            -DBD_BUNDLE_ID='"io.github.toobuntu.blackoutd"' \
            -framework Cocoa \
            -framework CoreGraphics \
            -framework IOKit \
            -I src
