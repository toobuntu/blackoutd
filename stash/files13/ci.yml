name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Xcode Command Line Tools
        run: xcode-select --install 2>/dev/null || true

      - name: Build
        run: make all

      - name: Verify binary exists and is signed
        run: |
          test -f blackoutd
          codesign --verify blackoutd

      - name: Lint with clang-format (check only)
        run: |
          if command -v clang-format >/dev/null 2>&1; then
            find . -name '*.m' -o -name '*.h' | \
              xargs clang-format --dry-run --Werror
          else
            echo "clang-format not available — skipping"
          fi
